name: Validate Terraform

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:
  schedule:
    - cron: "17 3 * * 1"

permissions:
  contents: read

concurrency:
  group: validate-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    if: github.event_name == 'push' || github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.10.0"

      - name: Setup tflint
        uses: terraform-linters/setup-tflint@v4
        with:
          tflint_version: "v0.55.0"

      - name: Setup Trivy
        uses: aquasecurity/setup-trivy@v0.2.6
        with:
          version: "v0.70.0"

      - name: Setup conftest
        shell: bash
        run: |
          set -euo pipefail
          CONFTEST_VERSION="0.57.0"
          CONFTEST_SHA256="db1018a7e301cada4d4bd8a70880a13314daae27b3f4d409c7ffba1847718392"
          TARBALL="conftest_${CONFTEST_VERSION}_Linux_x86_64.tar.gz"
          curl -sL --fail \
            "https://github.com/open-policy-agent/conftest/releases/download/v${CONFTEST_VERSION}/${TARBALL}" \
            -o "${TARBALL}"
          echo "${CONFTEST_SHA256}  ${TARBALL}" | sha256sum -c -
          tar -xz -C /usr/local/bin -f "${TARBALL}" conftest
          rm -f "${TARBALL}"
          conftest --version

      - name: Setup PowerShell
        shell: bash
        run: |
          if ! command -v pwsh &> /dev/null; then
            sudo apt-get update
            sudo apt-get install -y wget apt-transport-https software-properties-common
            wget -q "https://packages.microsoft.com/config/ubuntu/$(lsb_release -rs)/packages-microsoft-prod.deb"
            sudo dpkg -i packages-microsoft-prod.deb
            sudo apt-get update
            sudo apt-get install -y powershell
          fi

      - name: Check generated modules are in sync
        shell: pwsh
        run: |
          ./scripts/Sync-ProviderGeneratedModules.ps1 -IncludeDisabledModules -Check

      - name: Validate examples
        shell: pwsh
        run: |
          ./scripts/Initialize-Workspace.ps1 -Path ./examples/hello-world
          ./scripts/Initialize-Workspace.ps1 -Path ./examples/module-pattern
          ./scripts/Initialize-Workspace.ps1 -Path ./examples/multi-env-stack
          ./scripts/Initialize-Workspace.ps1 -Path ./examples/providers/aws-stack
          ./scripts/Initialize-Workspace.ps1 -Path ./examples/providers/multiprovider-stack
          ./scripts/Initialize-Workspace.ps1 -Path ./examples/providers/multi-cloud-free-tier
          ./scripts/Validate-Terraform.ps1 -Path ./examples/hello-world
          ./scripts/Validate-Terraform.ps1 -Path ./examples/module-pattern
          ./scripts/Validate-Terraform.ps1 -Path ./examples/multi-env-stack
          ./scripts/Validate-Terraform.ps1 -Path ./examples/providers/aws-stack
          ./scripts/Validate-Terraform.ps1 -Path ./examples/providers/multiprovider-stack
          ./scripts/Validate-Terraform.ps1 -Path ./examples/providers/multi-cloud-free-tier
          ./scripts/Validate-StackYaml.ps1 -Path ./examples

      - name: Enforce YAML token anti-pattern guardrails
        shell: pwsh
        run: |
          ./scripts/Test-YamlTokens.ps1 -RootPath .

      - name: Run Pester tests
        shell: pwsh
        run: |
          Install-Module -Name Pester -Force -SkipPublisherCheck -Scope CurrentUser -MinimumVersion 5.0.0
          Import-Module Pester -MinimumVersion 5.0.0 -Force
          $config = New-PesterConfiguration
          $config.Run.Path = './tests/'
          $config.Output.Verbosity = 'Detailed'
          $config.TestResult.Enabled = $true
          $config.TestResult.OutputFormat = 'NUnitXml'
          $config.TestResult.OutputPath = './test-results.xml'
          Invoke-Pester -Configuration $config

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: test-results.xml

  mcp-sync-check:
    if: github.event_name == 'push' || github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup PowerShell
        shell: bash
        run: |
          if ! command -v pwsh &> /dev/null; then
            sudo apt-get update -qq
            sudo apt-get install -y wget apt-transport-https software-properties-common
            wget -q "https://packages.microsoft.com/config/ubuntu/$(lsb_release -rs)/packages-microsoft-prod.deb"
            sudo dpkg -i packages-microsoft-prod.deb
            sudo apt-get update -qq
            sudo apt-get install -y powershell
          fi

      - name: Check MCP server enablement is in sync
        shell: pwsh
        run: |
          ./scripts/Sync-McpServerEnablement.ps1 -UseModuleDirectoryHints -Check

  provider-catalog-drift-report:
    if: github.event_name == 'push' || github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.10.0"

      - name: Generate provider catalog drift report (non-blocking)
        shell: pwsh
        run: |
          $reportDir = Join-Path $env:RUNNER_TEMP 'provider-catalog-drift-report'
          New-Item -ItemType Directory -Path $reportDir -Force | Out-Null
          ./scripts/Invoke-ProviderCatalogRefresh.ps1 -Providers aws -OutputDir $reportDir -SkipGeneratedModuleSync -SkipMcpSync

      - name: Add drift summary to workflow report
        if: always()
        shell: bash
        run: |
          REPORT_DIR="$RUNNER_TEMP/provider-catalog-drift-report"
          if [ -f "$REPORT_DIR/refresh-diff-summary.md" ]; then
            cat "$REPORT_DIR/refresh-diff-summary.md" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "Provider catalog drift summary was not generated." >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload provider drift artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: provider-catalog-drift-report
          path: |
            ${{ runner.temp }}/provider-catalog-drift-report/refresh-summary.json
            ${{ runner.temp }}/provider-catalog-drift-report/refresh-diff-summary.json
            ${{ runner.temp }}/provider-catalog-drift-report/refresh-diff-summary.md
            ${{ runner.temp }}/provider-catalog-drift-report/aws-catalog.json
            ${{ runner.temp }}/provider-catalog-drift-report/aws-summary.md

  provider-coverage-buildout-report:
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    continue-on-error: true
    permissions:
      contents: write
      issues: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.10.0"

      - name: Generate full provider coverage buildout report (non-blocking)
        shell: pwsh
        run: |
          ./scripts/Invoke-AutonomousInfraSync.ps1 -IncludeDisabledModules -ProvidersAll

      - name: Generate provider parameter coverage report (non-blocking)
        shell: pwsh
        run: |
          ./scripts/Test-ProviderParameterCoverage.ps1 -IncludeDisabledProviders

      - name: Add coverage and drift summary to workflow report
        if: always()
        shell: bash
        run: |
          if [ -f "docs/providers/README.md" ]; then
            {
              echo "## Provider Coverage Matrix";
              cat docs/providers/README.md;
            } >> "$GITHUB_STEP_SUMMARY"
          fi

          if [ -f "docs/providers/generated/refresh-diff-summary.md" ]; then
            {
              echo "";
              echo "## Provider Drift Summary";
              cat docs/providers/generated/refresh-diff-summary.md;
            } >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload provider coverage artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: provider-coverage-buildout-report
          path: |
            docs/providers/README.md
            docs/providers/generated/refresh-summary.json
            docs/providers/generated/refresh-diff-summary.json
            docs/providers/generated/refresh-diff-summary.md
            docs/providers/generated/module-generation-summary.json
            docs/providers/generated/module-scaffold-summary.json
            docs/providers/generated/provider-parameter-coverage-summary.json
            docs/providers/generated/provider-parameter-coverage-summary.md
            docs/providers/generated/*-parameter-coverage.json

      - name: Detect provider module drift
        id: drift
        if: always()
        shell: pwsh
        run: |
          $branchDate = Get-Date -Format 'yyyy-MM-dd'
          $driftBranch = "chore/provider-drift-$branchDate"
          $statusOutput = @(git status --short -- modules/providers/ docs/providers/generated/ examples/providers/schema-catalog/*/.terraform.lock.hcl)
          if ($LASTEXITCODE -ne 0) {
            throw "git status failed while detecting provider module drift (exit $LASTEXITCODE)."
          }
          $changedLines = @(
            $statusOutput | Where-Object { $_ -match '^[ MADRCU?]' }
          )
          $hasDrift = $changedLines.Count -gt 0
          "branch=$driftBranch" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          "date=$branchDate" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          "has-drift=$($hasDrift.ToString().ToLower())" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          if ($hasDrift) {
            Write-Host "Drift detected: $($changedLines.Count) files changed under modules/providers/, docs/providers/generated/, or schema-catalog lock files."
          } else {
            Write-Host "No provider module drift detected."
          }

      - name: Ensure refresh-diff-summary exists
        if: steps.drift.outputs['has-drift'] == 'true'
        shell: pwsh
        run: |
          $summaryPath = 'docs/providers/generated/refresh-diff-summary.md'
          $summaryJsonPath = 'docs/providers/generated/refresh-diff-summary.json'
          if (-not (Test-Path -LiteralPath $summaryPath)) {
            '_No drift summary generated; review the regenerated files manually._' |
              Out-File -FilePath $summaryPath -Encoding utf8 -NoNewline
          }
          if (-not (Test-Path -LiteralPath $summaryJsonPath)) {
            @() | ConvertTo-Json -Depth 4 | Out-File -FilePath $summaryJsonPath -Encoding utf8
          }

      - name: Open or update provider drift PR
        id: drift_pr
        if: success() && steps.drift.outputs['has-drift'] == 'true'
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: ${{ steps.drift.outputs.branch }}
          title: "chore(provider): refresh reflected modules — ${{ steps.drift.outputs.date }}"
          body-path: docs/providers/generated/refresh-diff-summary.md
          commit-message: "chore(provider): refresh reflected modules — ${{ steps.drift.outputs.date }}"
          labels: provider-drift
          add-paths: |
            modules/providers/**
            docs/providers/generated/**
            examples/providers/schema-catalog/*/.terraform.lock.hcl

      - name: Open or update provider drift issue
        if: always() && steps.drift.outputs['has-drift'] == 'true' && (steps.drift_pr.outcome != 'success' || steps.drift_pr.outputs['pull-request-operation'] == 'none')
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = 'docs/providers/generated/refresh-diff-summary.json';
            if (!fs.existsSync(path)) {
              core.info('No diff summary found. Skipping issue automation.');
              return;
            }

            const diff = JSON.parse(fs.readFileSync(path, 'utf8'));
            const entries = Array.isArray(diff) ? diff : [diff];
            const changed = entries.filter((x) => x.status !== 'unchanged');
            if (changed.length === 0) {
              core.info('Provider summary is empty or unchanged. Skipping issue automation (drift may still be present in lock files or PR diff).');
              return;
            }

            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const title = 'Provider schema drift detected';
            const label = 'provider-drift';

            const bodyLines = [
              'Automated provider schema drift was detected by scheduled CI.',
              '',
              '| Provider | Status | Resources (+/-/~) | Data Sources (+/-/~) |',
              '|---|---|---:|---:|'
            ];

            for (const item of changed) {
              bodyLines.push(`| ${item.provider} | ${item.status} | ${item.resourceAddedCount}/${item.resourceRemovedCount}/${item.resourceChangedCount} | ${item.dataSourceAddedCount}/${item.dataSourceRemovedCount}/${item.dataSourceChangedCount} |`);
            }

            const body = bodyLines.join('\n');

            const labelsResp = await github.rest.issues.listLabelsForRepo({ owner, repo });
            const hasLabel = labelsResp.data.some((l) => l.name === label);
            if (!hasLabel) {
              await github.rest.issues.createLabel({
                owner,
                repo,
                name: label,
                color: 'fbca04',
                description: 'Automated provider schema drift detection'
              });
            }

            const issuesResp = await github.rest.issues.listForRepo({
              owner,
              repo,
              state: 'open',
              labels: label,
              per_page: 100
            });

            const existing = issuesResp.data.find((i) => i.title === title);
            if (existing) {
              await github.rest.issues.update({
                owner,
                repo,
                issue_number: existing.number,
                body
              });
              core.info(`Updated issue #${existing.number}`);
            } else {
              const created = await github.rest.issues.create({
                owner,
                repo,
                title,
                body,
                labels: [label]
              });
              core.info(`Created issue #${created.data.number}`);
            }

  terraform-policy-check:
    if: github.event_name == 'push' || github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.10.0"

      - name: Install Conftest
        shell: bash
        run: |
          set -euo pipefail
          CONFTEST_VERSION="0.57.0"
          CONFTEST_SHA256="db1018a7e301cada4d4bd8a70880a13314daae27b3f4d409c7ffba1847718392"
          TARBALL="conftest_${CONFTEST_VERSION}_Linux_x86_64.tar.gz"
          curl -sL --fail \
            "https://github.com/open-policy-agent/conftest/releases/download/v${CONFTEST_VERSION}/${TARBALL}" \
            -o "${TARBALL}"
          echo "${CONFTEST_SHA256}  ${TARBALL}" | sha256sum -c -
          tar -xz -C /usr/local/bin -f "${TARBALL}" conftest
          rm -f "${TARBALL}"
          conftest --version

      - name: Create plan JSON for policy check
        shell: pwsh
        run: |
          ./scripts/Initialize-Workspace.ps1 -Path ./examples/hello-world
          ./scripts/Invoke-TerraformPlan.ps1 -Path ./examples/hello-world -Out tfplan -Force

      - name: Evaluate plan policy
        shell: bash
        run: |
          conftest test ./examples/hello-world/tfplan.json --policy ./policy/terraform

      - name: Upload policy artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: terraform-policy-check
          path: |
            examples/hello-world/tfplan.json

  module-contract-tests:
    if: github.event_name == 'push' || github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.10.0"

      - name: Execute provider module contract tests
        shell: bash
        run: |
          set -euo pipefail
          while IFS= read -r module_dir; do
            if [ -f "$module_dir/tests/basic.tftest.hcl" ]; then
              echo "Testing module: $module_dir"
              pwsh -File ./scripts/Initialize-Workspace.ps1 -Path "$module_dir"
              pwsh -File ./scripts/Invoke-TerraformTest.ps1 -Path "$module_dir"
            fi
          done < <(find ./modules/providers -mindepth 2 -maxdepth 2 -type d | sort)

  cost-estimate:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    continue-on-error: true
    env:
      INFRACOST_API_KEY: ${{ secrets.INFRACOST_API_KEY }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.10.0"

      - name: Setup Infracost
        if: env.INFRACOST_API_KEY != ''
        uses: infracost/actions/setup@v3
        with:
          version: latest
          api-key: ${{ env.INFRACOST_API_KEY }}

      - name: Generate optional cost estimate
        if: env.INFRACOST_API_KEY != ''
        shell: bash
        run: |
          set -euo pipefail
          infracost breakdown --path ./examples/hello-world --format json --out-file ./infracost.json

      - name: Upload cost artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: infracost-estimate
          path: |
            infracost.json

  sbom:
    if: github.event_name == 'push' || github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Generate SBOM
        uses: anchore/sbom-action@v0
        with:
          path: .
          format: spdx-json
          output-file: sbom.spdx.json

      - name: Upload SBOM artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sbom
          path: sbom.spdx.json

  actionlint:
    if: github.event_name == 'push' || github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install actionlint
        shell: bash
        run: |
          set -euo pipefail
          ACTIONLINT_VERSION="1.7.7"
          ACTIONLINT_SHA256="023070a287cd8cccd71515fedc843f1985bf96c436b7effaecce67290e7e0757"
          TARBALL="actionlint_${ACTIONLINT_VERSION}_linux_amd64.tar.gz"
          curl -sL --fail \
            "https://github.com/rhysd/actionlint/releases/download/v${ACTIONLINT_VERSION}/${TARBALL}" \
            -o "${TARBALL}"
          echo "${ACTIONLINT_SHA256}  ${TARBALL}" | sha256sum -c -
          tar -xz -C /usr/local/bin -f "${TARBALL}" actionlint
          rm -f "${TARBALL}"
          actionlint --version

      - name: Run actionlint
        shell: bash
        run: |
          actionlint -color

  merge-readiness:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    needs:
      - validate
      - mcp-sync-check
      - terraform-policy-check
      - module-contract-tests
      - actionlint
    steps:
      - name: Enforce required pre-merge checks
        shell: bash
        run: |
          set -euo pipefail

          echo "validate result: ${{ needs.validate.result }}"
          echo "mcp-sync-check result: ${{ needs.mcp-sync-check.result }}"
          echo "terraform-policy-check result: ${{ needs.terraform-policy-check.result }}"
          echo "module-contract-tests result: ${{ needs.module-contract-tests.result }}"
          echo "actionlint result: ${{ needs.actionlint.result }}"

          if [ "${{ needs.validate.result }}" != "success" ]; then
            echo "validate job must pass before merge." >&2
            exit 1
          fi
          if [ "${{ needs.mcp-sync-check.result }}" != "success" ]; then
            echo "mcp-sync-check job must pass before merge." >&2
            exit 1
          fi
          if [ "${{ needs.terraform-policy-check.result }}" != "success" ]; then
            echo "terraform-policy-check job must pass before merge." >&2
            exit 1
          fi
          if [ "${{ needs.module-contract-tests.result }}" != "success" ]; then
            echo "module-contract-tests job must pass before merge." >&2
            exit 1
          fi
          if [ "${{ needs.actionlint.result }}" != "success" ]; then
            echo "actionlint job must pass before merge." >&2
            exit 1
          fi
