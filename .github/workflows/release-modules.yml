name: Release Modules

on:
  workflow_dispatch:
    inputs:
      tag_name:
        description: "Tag name for this release (for example modules-v1.0.0)"
        required: true
        type: string
      target_commitish:
        description: "Branch or commit SHA to tag"
        required: false
        default: "main"
        type: string

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create GitHub release
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const tag = core.getInput('tag_name', { required: true });
            const target = core.getInput('target_commitish') || 'main';

            const existing = await github.rest.repos.listReleases({ owner, repo, per_page: 100 });
            if (existing.data.some((r) => r.tag_name === tag)) {
              core.setFailed(`Release with tag '${tag}' already exists.`);
              return;
            }

            const created = await github.rest.repos.createRelease({
              owner,
              repo,
              tag_name: tag,
              target_commitish: target,
              name: tag,
              generate_release_notes: true,
              draft: false,
              prerelease: false
            });

            core.info(`Created release: ${created.data.html_url}`);
